name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install server dependencies
        run: npm --prefix server ci --include=dev

      - name: Build demo assets
        run: npm --prefix server run demo:build

      - name: Build demo-app assets
        run: npm --prefix server run demo:build-app

      - name: Build static publish artifact
        run: node scripts/build-static-publish.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/static-publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4