name: Ship check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Syntax check
        run: npm --prefix server run check

      - name: Unit tests
        run: npm --prefix server test

      - name: Demo asset check
        run: npm --prefix server run demo:check

      - name: Protected frontend
        run: node scripts/check-protected-frontend.mjs

      - name: Public asset disclosure
        run: node scripts/check-public-assets.mjs

      - name: APCA contrast
        run: node scripts/check-contrast-apca.mjs

      - name: Risk decisions
        run: node scripts/check-risk-decisions.mjs

      - name: Public route contract
        run: node scripts/check-public-routes.mjs

      - name: Sync sharing surface
        run: node scripts/check-sync-surface.mjs

      - name: State recovery
        run: node scripts/check-state-recovery.mjs

      - name: Public boundary
        run: node scripts/check-public-boundary.mjs

      - name: Docker boundary
        run: node scripts/check-docker-boundary.mjs

      - name: Deploy config
        run: node scripts/check-deploy-config.mjs

      - name: Compliance audit
        run: node scripts/check-compliance-audit.mjs

      - name: Static publish artifact
        run: node scripts/check-static-publish.mjs

      - name: Static preview boundary
        run: node scripts/check-static-preview.mjs

      - name: API smoke
        run: node scripts/check-api-smoke.mjs

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: server

      - name: Behavior smoke
        run: node scripts/check-behavior-smoke.mjs

      - name: Git whitespace
        run: git diff --check
