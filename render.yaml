services:
  - type: web
    name: projects-web-demo
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROJECTS_STATE_STORAGE
        value: postgres
      - key: PROJECTS_POSTGRES_SSL
        value: require
      - key: DATABASE_URL
        fromDatabase:
          name: projects-web-demo-db
          property: connectionString
databases:
  - name: projects-web-demo-db
    databaseName: projects_web_demo
    user: projects_web_demo
    plan: basic-256mb
    region: oregon
    ipAllowList: []
