services:
  - type: web
    name: projects-web-demo
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROJECTS_STATE_FILE
        value: /app/state/state.json
    disk:
      name: projects-web-demo-state
      mountPath: /app/state
      sizeGB: 1
